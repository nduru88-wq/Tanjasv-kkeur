<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Vækkeur</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Vækkeur">

  <link rel="apple-touch-icon" href="icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="app">
    <div id="clock">
      <span id="clockHours">00</span><span id="clockColon">:</span><span id="clockMinutes">00</span>
    </div>

    <div id="alarmStatus" class="alarm-status status-idle">Ingen alarm sat</div>

    <div class="buttonRow">
      <button class="mainButton" id="openAlarmBtn">Sæt alarm</button>
      <button class="secondaryButton" id="clearAlarmBtn" style="display:none;">Fjern alarm</button>
    </div>
  </main>

  <audio id="alarmSound" preload="auto"></audio>

  <div id="alarmModal" class="modal hidden">
    <div class="modalContent">
      <h2>Sæt alarm</h2>

      <div class="timePickerWrap">
        <div class="timePickerBlock">
          <div class="pickerLabel">Time</div>
          <button class="stepButton" id="hourUpBtn" type="button">+</button>
          <div class="timeValue" id="hourValue">00</div>
          <button class="stepButton" id="hourDownBtn" type="button">−</button>
        </div>

        <div class="timeSeparator">:</div>

        <div class="timePickerBlock">
          <div class="pickerLabel">Minut</div>
          <button class="stepButton" id="minuteUpBtn" type="button">+</button>
          <div class="timeValue" id="minuteValue">00</div>
          <button class="stepButton" id="minuteDownBtn" type="button">−</button>
        </div>
      </div>

      <div class="pickerGroup">
        <label for="soundSelect">Lyd</label>
        <select id="soundSelect">
          <option value="beep">Standard alarm</option>
          <option value="Wake me up.mp3">Wake me up.mp3</option>
          <option value="Leif.mp3">Leif.mp3</option>
          <option value="Fuglekvidder.mp3">Fuglekvidder.mp3</option>
        </select>
      </div>

      <div class="modalButtons">
        <button class="secondaryButton" id="cancelAlarmBtn" type="button">Annuller</button>
        <button class="mainButton" id="saveAlarmBtn" type="button">Gem alarm</button>
      </div>
    </div>
  </div>

  <div id="ringingModal" class="modal hidden">
    <div class="ringingContent">
      <div class="ringingTitle">ALARM</div>
      <div id="ringingTime" class="ringingTime">00:00</div>

      <div class="ringingButtons">
        <button class="dangerButton" id="stopAlarmBtn" type="button">Stop alarm</button>
        <button class="mainButton" id="snoozeAlarmBtn" type="button">Snooze 10 min</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js")
          .then((registration) => {
            console.log("Service Worker registreret:", registration.scope);
          })
          .catch((error) => {
            console.log("Service Worker fejl:", error);
          });
      });
    }
  </script>
</body>
</html>
